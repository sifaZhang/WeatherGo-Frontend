server {
    listen 80;
    
    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # React Router fallback
        try_files $uri $uri/ /index.html;
    }

    # Proxy configuration mapped from vite.config.js
    location /recommend {
        # host.docker.internal connects to localhost on Mac/Windows Docker Desktop
        # Update this if your backend is also in a Docker container (e.g. proxy_pass http://backend:5002)
        proxy_pass http://host.docker.internal:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
