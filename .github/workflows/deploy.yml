name: Deploy to Render

on:
  push:
    branches:
      - main # 如果你的默认分支叫 master，请改成 master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Frontend Deploy
        run: |
          echo "Triggering Render deployment..."
          curl -s -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
